<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bondroy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Boxicons (for the Google/Twitter icons, though I will use SVGs if possible or boxicons) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        /* Diagonal stripes pattern */
        .pattern-bg {
            background: repeating-linear-gradient(-45deg,
                    #262626,
                    #262626 50px,
                    #ffffff 50px,
                    #ffffff 100px);
        }

        /* Custom input focus styles to match mockup */
        .custom-input {
            transition: all 0.2s ease;
        }

        .custom-input:focus {
            outline: none;
            border-color: #d1d5db;
            box-shadow: 0 0 0 4px rgba(243, 244, 246, 1);
        }
    </style>
</head>

<body class="h-screen w-full flex overflow-hidden">

    <!-- Left Side: Pattern -->
    <div class="hidden lg:flex w-1/2 h-full p-4 md:p-8 flex-shrink-0">
        <!-- The inner div limits the pattern so there is white padding around it exactly like the mockup -->
        <div class="w-full h-full pattern-bg shadow-sm"></div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-[420px] flex flex-col items-center">

            <!-- Logo area -->
            <div class="flex items-center justify-center gap-2 mb-6 cursor-pointer">
                <!-- Bondroy abstract logo using tailored divs -->
                <div class="flex items-end gap-[3px]">
                    <div class="w-[8px] h-[22px] bg-gray-900 skew-x-[-20deg] rounded-[1px]"></div>
                    <div class="w-[4px] h-[16px] bg-gray-900 skew-x-[-20deg] border-b-2 border-white rounded-[1px]">
                    </div>
                </div>
                <h1 class="text-[22px] font-black tracking-tight text-gray-900">Libraspire</h1>
            </div>

            <!-- Welcome Title -->
            <h2 class="text-[20px] font-semibold text-gray-800 mb-10 text-center">Welcome back!</h2>

            <!-- Form -->
            <form id="loginForm" class="w-full flex flex-col gap-5">

                <p id="errorMsg" class="hidden text-red-500 text-sm font-semibold text-center"></p>

                <!-- Email Input -->
                <div>
                    <input type="email" id="email" placeholder="name@email.com"
                        class="custom-input w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 font-medium"
                        required />
                </div>

                <!-- Password Input -->
                <div>
                    <input type="password" id="password" placeholder="Password"
                        class="custom-input w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 font-medium"
                        required />
                </div>

                <!-- Remember Me & Reset Password -->
                <div class="flex items-center justify-between mt-1 mb-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <div
                            class="relative w-[18px] h-[18px] border-2 border-gray-800 rounded flex items-center justify-center bg-white group-hover:bg-gray-50 transition">
                            <!-- Inner dot/box for custom checkbox look from mockup -->
                            <div class="w-2 h-2 bg-gray-800 rounded-[1px]"></div>
                        </div>
                        <span
                            class="text-[13px] font-semibold text-gray-500 group-hover:text-gray-700 transition">Remember
                            me</span>
                        <!-- Hidden actual checkbox -->
                        <input type="checkbox" checked class="hidden" />
                    </label>
                    <a href="#"
                        class="text-[13px] font-bold text-gray-700 hover:text-black hover:underline transition">Reset
                        password</a>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full bg-[#262626] text-white font-semibold py-3.5 rounded-lg text-[15px] hover:bg-black transition-colors shadow-sm">
                    Sign in
                </button>

            </form>

            <!-- Sign Up text -->
            <div class="mt-6 mb-8 text-center text-sm">
                <span class="text-gray-500 font-medium">Don't have an account? </span>
                <a href="#" class="font-bold text-gray-900 hover:underline">Sign up</a>
            </div>

            <!-- Divider -->
            <div class="w-full flex items-center gap-3 mb-8">
                <div class="flex-1 h-[1px] bg-gray-100"></div>
                <span
                    class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2 relative top-[1px]">or</span>
                <div class="flex-1 h-[1px] bg-gray-100"></div>
            </div>

            <!-- OAuth Buttons -->
            <div class="w-full flex flex-col gap-3">
                <button type="button"
                    class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-50 transition">
                    <!-- Google SVG Icon -->
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
                <button type="button"
                    class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white border border-gray-200 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-50 transition">
                    <!-- Twitter SVG Icon -->
                    <svg class="w-5 h-5" fill="#1DA1F2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
                    </svg>
                    Continue with Twitter
                </button>
            </div>

        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const password = passwordInput.value;

            // Validasi dummy sederhana
            if (email === "admin@gmail.com" && password === "admin123") {
                errorMsg.classList.add('hidden');
                // Alihkan ke Dashboard 
                window.location.href = "dashboard.html";
            } else {
                errorMsg.textContent = "Email atau password salah! Coba admin@gmail.com / admin123";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
